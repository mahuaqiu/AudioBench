[package]
build = "build.rs"
name = "audio_bench"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
# WAV 音频解码
hound = "3.5"
rustfft = "6.4.1"
# 序列化/反序列化
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# DNSMOS ONNX 推理 - 禁用自动下载，使用嵌入的本地 DLL
# 注意：启用 ndarray feature 时 ort 会自动引入 ndarray，不需要手动指定
ort = { version = "2.0.0-rc.12", default-features = false, features = ["ndarray", "api-24", "std"] }

# Windows DLL 搜索路径需要
[target.'cfg(windows)'.dependencies]
libc = "0.2"

[profile.release]
opt-level = "s"
lto = true
strip = true
